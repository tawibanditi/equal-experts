name: CI/CD Pipeline

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: gist-server

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run unit tests
      working-directory: ./gist-server
      run: |
        python -m unittest test_server.py -v

    - name: Test server startup
      working-directory: ./gist-server
      run: |
        # Start server in background
        python server.py &
        SERVER_PID=$!
        
        # Wait for server to start
        sleep 3
        
        # Test the endpoint
        curl -f http://localhost:8080/octocat || (kill $SERVER_PID && exit 1)
        
        # Cleanup
        kill $SERVER_PID

  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'  # Only push on actual pushes, not PRs

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./gist-server
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image digest
      run: echo ${{ steps.build.outputs.digest }}
      