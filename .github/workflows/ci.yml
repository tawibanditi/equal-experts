name: CI/CD Pipeline

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: gist-server

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run unit tests
      working-directory: ./gist-server
      run: |
        python -m unittest test_server.py -v

    - name: Test server startup
      working-directory: ./gist-server
      run: |
        # Start server in background
        python server.py &
        SERVER_PID=$!
        
        # Wait for server to start
        sleep 3
        
        # Test the endpoint
        curl -f http://localhost:8080/octocat || (kill $SERVER_PID && exit 1)
        
        # Cleanup
        kill $SERVER_PID

  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'  # Only push on actual pushes, not PRs

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./gist-server
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image digest
      run: echo ${{ steps.build.outputs.digest }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'  # Only deploy from main branch
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl for Docker Desktop
      run: |
        # Create kubeconfig for Docker Desktop (for demonstration)
        # In production, use your actual cluster credentials
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
        kubectl config current-context

    - name: Update K8s manifest with new image
      run: |
        # Update the image tag in the manifest
        sed -i "s|image: .*/gist-server:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/gist-server:${{ github.sha }}|g" k8s/gist-server.yaml
        
        # Verify the change
        grep "image:" k8s/gist-server.yaml

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/gist-server.yaml
        
        # Wait for deployment to complete
        kubectl rollout status deployment/gist-server --timeout=300s
        
        # Show deployment status
        kubectl get pods -l app=gist-server
        kubectl get services gist-server-service

    - name: Verify deployment
      run: |
        # Get service details
        kubectl describe service gist-server-service
        
        # Test the deployment (if accessible)
        echo "Deployment completed successfully!"
