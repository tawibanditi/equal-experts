name: CI/CD Pipeline #Build and deploy to Docker Hub and Kubernetes

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: gist-server

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run unit tests
      working-directory: ./gist-server
      run: |
        python -m unittest test_server.py -v

    - name: Test server startup
      working-directory: ./gist-server
      run: |
        # Start server in background
        python server.py &
        SERVER_PID=$!
        
        # Wait for server to start
        sleep 3
        
        # Test the endpoint
        curl -f http://localhost:8080/octocat || (kill $SERVER_PID && exit 1)
        
        # Cleanup
        kill $SERVER_PID

  build-and-deploy:
        runs-on: self-hosted
        needs: test

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Build Docker image
          run: docker build -t gist-server:${{github.sha}} -t gist-server:latest .

        - name: Switch to Docker-Desktop context
          run: kubectl config use-context docker-desktop

        - name: Deploy to Kubernetes
          run: |
            kubectl set image deployment/gist-server gist-server=gist-server:${{github.sha}} -n default
            kubectl rollout status deployment/gist-server --timeout=120s -n default



 
