apiVersion: apps/v1
kind: Deployment
metadata:
  name: gist-server
  labels:
    app: gist-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gist-server
  template:
    metadata:
      labels:
        app: gist-server
    spec:
      containers:
      - name: gist-server
        # Use image from Docker Hub built by CI/CD pipeline
        image: ${{ secrets.DOCKERHUB_USERNAME }}/gist-server:latest
        imagePullPolicy: Always  # Always pull latest from registry
        ports:
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: /octocat
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /octocat
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gist-server-service
  labels:
    app: gist-server
spec:
  selector:
    app: gist-server
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  type: LoadBalancer  # Docker Desktop will expose this on localhost